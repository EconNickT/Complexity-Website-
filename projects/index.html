<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Complexity Insights</title>
    <meta name="description" content="A refined Projects page for Complexity Insights is currently in the works.">
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg">

    <!-- Typography System -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* PAPER / INK */
            --paper:       #faf9f6;
            --paper-2:     #f0ede3;
            --paper-3:     #fffef8;
            --ink:         #10100f;
            --ink-2:       #23231f;
            --muted:       #6a685f;
            --rule:        #ddd9cc;
            --rule-strong: #bfbaa8;

            /* ACCENTS */
            --accent:      #1a2a44; /* navy */
            --accent-2:    #1d3a2f; /* forest */
            --oxblood:     #6b1f1a;
            --brass:       #8a6a2a;
            --brass-2:     #d4b47a;

            /* TYPOGRAPHY */
            --serif: 'Source Serif 4', serif;
            --sans: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: var(--serif);
        }

        a { color: var(--ink); text-decoration: none; }
        a:hover { color: var(--accent); }

        /* ============================================================
           MASTHEAD (4.1)
           ============================================================ */
        .masthead {
            padding: 1.3rem 3vw 1rem;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 1px solid var(--rule-strong);
            font-family: var(--sans);
            gap: 2rem;
        }
        .wordmark { font-family: var(--serif); font-weight: 600; font-size: 1.25rem; color: var(--ink); display: inline-flex; align-items: center; gap: .55em; }
        .wordmark .mark { width: 1.35em; height: 1.35em; display: inline-block; flex-shrink: 0; }
        .masthead nav { display: flex; gap: 2rem; justify-content: center; font-size: 12.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
        .masthead nav a { color: var(--muted); }
        .masthead nav a:hover, .masthead nav a.active { color: var(--ink); }
        .masthead nav a.active { border-bottom: 1px solid var(--accent); padding-bottom: 2px; }

        /* ============================================================
           MAIN — golfer void
           ============================================================ */
        .liminal-container {
            flex: 1;
            max-width: 1560px;
            width: 100%;
            margin: 0 auto;
            padding: 4rem 3vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* SVG Animation Styling */
        .golf-scene {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--rule);
            padding-bottom: 2rem;
        }

        .putter {
            transform-origin: 275px 85px;
            animation: swing 4s infinite ease-in-out;
        }

        .ball {
            animation: roll 4s infinite cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The endless loop: Swing, miss, reset */
        @keyframes swing {
            0%, 10% { transform: rotate(0deg); }
            15% { transform: rotate(12deg); } /* Backswing */
            20% { transform: rotate(-8deg); } /* Follow through */
            30%, 100% { transform: rotate(0deg); }
        }

        @keyframes roll {
            0%, 19% { 
                transform: translate(0, 0); 
                opacity: 1; 
            }
            35% { 
                /* Lips the hole */
                transform: translate(-145px, 2px); 
            }
            45% { 
                /* Rolls just past it */
                transform: translate(-165px, -8px); 
                opacity: 1; 
            }
            55% {
                transform: translate(-170px, -10px); 
                opacity: 0; /* Fades out into the void */
            }
            100% { 
                transform: translate(0, 0); 
                opacity: 0; 
            }
        }

        /* Typography Mapping */
        .section-label {
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.22em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .headline {
            font-family: var(--serif);
            font-size: 2.25rem;
            font-weight: 400;
            line-height: 1.3;
            max-width: 600px;
            margin: 0;
            color: var(--ink);
        }

        .headline em {
            color: var(--accent-2); /* Forest green accent */
            font-style: italic;
        }

        .metadata {
            margin-top: 1.5rem;
            font-family: var(--mono);
            font-size: 11.5px;
            color: var(--muted);
        }

        /* ============================================================
           FOOTLINE (4.1)
           ============================================================ */
        .footline {
            background: var(--ink);
            color: #7a7162;
            padding: 1.4rem 3vw;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: .04em;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #3a332a;
        }
        .footline a { color: var(--brass-2); }

        @media (max-width: 700px) {
            .masthead { grid-template-columns: 1fr; justify-items: start; gap: .9rem; }
            .masthead nav { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- MASTHEAD -->
<header class="masthead">
  <a href="/" class="wordmark">
    <img class="mark" src="/brand/favicon.svg" alt="" aria-hidden="true">
    Complexity Insights
  </a>
  <nav>
    <a href="/projects/" class="active">Projects</a>
    <a href="https://complexityinsights.substack.com" target="_blank" rel="noopener">Writings</a>
    <a href="/about/">About</a>
    <a href="/#contact">Contact</a>
  </nav>
</header>

    <main class="liminal-container">
        
        <!-- SVG Canvas (Floating in --paper void) -->
        <svg class="golf-scene" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            
            <!-- The Floating Green -->
            <ellipse cx="200" cy="150" rx="150" ry="40" fill="var(--accent-2)" stroke="var(--rule-strong)" stroke-width="1"/>
            
            <!-- The Hole -->
            <ellipse cx="105" cy="150" rx="8" ry="3" fill="var(--ink)"/>
            
            <!-- The Flag -->
            <line x1="105" y1="150" x2="105" y2="60" stroke="var(--ink-2)" stroke-width="1.5"/>
            <polygon points="105,60 135,72 105,85" fill="var(--oxblood)"/>
            
            <!-- Minimalist Golfer Silhouette -->
            <g stroke="var(--ink-2)" stroke-width="2" stroke-linecap="round" fill="none">
                <!-- Legs -->
                <line x1="270" y1="145" x2="280" y2="110"/>
                <line x1="290" y1="145" x2="280" y2="110"/>
                <!-- Torso & Head -->
                <line x1="280" y1="110" x2="275" y2="75"/>
                <circle cx="275" cy="65" r="6" fill="var(--ink-2)"/>
                <!-- Arms -->
                <line x1="275" y1="75" x2="265" y2="105"/>
            </g>

            <!-- Vintage Blade Iron Putter (Animated) -->
            <g class="putter">
                <line x1="265" y1="105" x2="252" y2="145" stroke="var(--ink)" stroke-width="1.5"/>
                <line x1="250" y1="145" x2="256" y2="147" stroke="var(--ink)" stroke-width="2.5" stroke-linecap="square"/>
            </g>

            <!-- The Golf Ball (Animated) -->
            <circle class="ball" cx="248" cy="148" r="2.5" fill="var(--paper)"/>
            
        </svg>

        <!-- Brand Typography Structure -->
        <div class="section-label">§ IV.A — Projects Archive</div>
        
        <h1 class="headline">Reading the green. A <em>refined</em> portfolio is currently in the works.</h1>
        
        <div class="metadata">[ Coming Soon ]</div>

    </main>

<div class="footline">
  <span>© 2026 Complexity Insights · Nicholas Thomas · Washington, D.C.</span>
  <span>Set in Source Serif 4, Inter &amp; JetBrains Mono</span>
</div>

</body>
</html>
